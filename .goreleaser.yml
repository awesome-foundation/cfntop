version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: cfntop
    main: ./cmd/cfntop
    binary: cfntop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: cfntop
    builds: [cfntop]
    format: tar.gz
    name_template: "cfntop_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: awesome-foundation
    name: cfntop
