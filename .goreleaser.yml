version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: cfntop
    main: ./cmd/cfntop
    binary: cfntop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: cfntop
    builds: [cfntop]
    format: tar.gz
    name_template: "cfntop_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

brews:
  - repository:
      owner: awesome-foundation
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/awesome-foundation/cfntop
    description: Live TUI monitor for AWS CloudFormation stacks
    license: MIT
    install: |
      bin.install "cfntop"
    test: |
      system bin/"cfntop", "--version"

release:
  github:
    owner: awesome-foundation
    name: cfntop
